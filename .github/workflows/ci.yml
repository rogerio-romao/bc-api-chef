name: CI
on:
    pull_request:
        branches: [main]

permissions:
    contents: read

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v6

            - uses: pnpm/action-setup@v4
              with:
                  version: 10

            - name: Set up Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: 'latest'
                  cache: 'pnpm'

            - name: Install dependencies
              run: pnpm install

            - name: Lint
              run: pnpm run lint

            - name: Type Check
              run: pnpm run typecheck

            - name: Test
              run: pnpm run test:ci

            - name: Build
              run: pnpm run build
